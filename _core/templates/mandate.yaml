# NCL Mandate Template
# Generated by Strategy & Doctrine agent after council approval

mandate_id: "MANDATE-{YEAR}-{SEQ}"
created_at: "{ISO8601}"
updated_at: "{ISO8601}"

# Classification
pillar: "{NCL|NCC|BRS|AAC}"
priority: "P1"  # P1=critical, P2=high, P3=medium, P4=low
type: "STRATEGIC"  # STRATEGIC, OPERATIONAL, TACTICAL

# Content
title: "{Clear mandate title}"
objective: "{What this mandate aims to achieve}"
description: |
  {Detailed description of scope, approach, and expected outcomes}

# Context
origin:
  pump_id: "{pump prompt that triggered this}"
  council_session: "{council log reference}"
  intelligence_signals: []

# Success criteria
success_metrics:
  - metric: "{Measurable outcome}"
    target: "{Target value}"
    current: null

# Scope
in_scope:
  - "{What is covered}"
out_of_scope:
  - "{What is explicitly excluded}"

# Dependencies
dependencies:
  mandates: []
  services: []
  external: []

# Timeline
deadline: "{ISO date or 'ongoing'}"
review_date: "{ISO date}"
milestones: []

# Assignment
assigned_to:
  primary: "{Pillar/Agent}"
  supporting: []

# Approval
requested_by: "{NATRIX|council|auto}"
approved_by: "{NATRIX|council}"
approval_date: "{ISO date}"

# Status tracking
status: "DRAFT"  # DRAFT, PENDING_APPROVAL, ACTIVE, COMPLETED, DEPRECATED
progress_pct: 0
last_status_update: null
ncc_work_order: null

# Paperclip tracking
paperclip_issue_id: null
paperclip_cost_events: []
