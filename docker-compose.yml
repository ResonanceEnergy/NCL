version: '3.8'

services:
  # NCL Brain Service
  ncl-brain:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ncl-brain
    ports:
      - "8800:8800"
    mem_limit: 4g
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - NCL_ANTHROPIC_API_KEY=${NCL_ANTHROPIC_API_KEY}
      - NCL_XAI_API_KEY=${NCL_XAI_API_KEY}
      - NCL_GOOGLE_API_KEY=${NCL_GOOGLE_API_KEY}
      - NCL_PERPLEXITY_API_KEY=${NCL_PERPLEXITY_API_KEY}
      - NCL_OPENAI_API_KEY=${NCL_OPENAI_API_KEY}
      - NCL_X_BEARER_TOKEN=${NCL_X_BEARER_TOKEN}
      - NCL_YOUTUBE_API_KEY=${NCL_YOUTUBE_API_KEY}
      - NCL_REDDIT_CLIENT_ID=${NCL_REDDIT_CLIENT_ID}
      - NCL_REDDIT_CLIENT_SECRET=${NCL_REDDIT_CLIENT_SECRET}
      - NCL_OLLAMA_HOST=ollama:11434
      - NCL_PAPERCLIP_HOST=paperclip
      - NCL_PAPERCLIP_PORT=3102
      - NCL_DEBUG=false
    depends_on:
      ollama:
        condition: service_healthy
      paperclip:
        condition: service_healthy
    networks:
      - resonance-energy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8800/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Ollama local models
  ollama:
    image: ollama/ollama:0.3
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    networks:
      - resonance-energy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Pre-download models on startup (optional)
    # command: serve & sleep 5 && ollama pull qwen3:32b && ollama pull deepseek-coder-v2:16b

  # Paperclip (mocked for dev)
  paperclip:
    image: python:3.12-slim
    container_name: paperclip-mock
    working_dir: /app
    volumes:
      - ./paperclip_mock.py:/app/main.py
    ports:
      - "3102:3102"
    command: python /app/main.py
    networks:
      - resonance-energy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3102/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  resonance-energy:
    driver: bridge

volumes:
  ollama_data:
