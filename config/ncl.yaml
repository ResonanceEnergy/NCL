# NCL Brain Service Configuration
# NOTE: API keys must NOT be set here — use .env or environment variables instead.
#       This file is checked into version control and is for non-secret tunables only.

# Service
service_name: ncl-brain
port: 8800
debug: false

# Storage (overridden by DATA_DIR / CONFIG_DIR env vars in Docker)
data_dir: ~/dev/NCL/data
config_dir: ~/dev/NCL/config

# Ollama
ollama_host: "localhost:11434"

# Paperclip
paperclip_host: "localhost"
paperclip_port: 3100

# Scan Intervals (seconds)
x_scan_interval: 300
youtube_scan_interval: 600
reddit_scan_interval: 600
prediction_interval: 1800
memory_consolidation_interval: 3600

# Memory
memory_importance_threshold: 20.0
memory_decay_rate: 0.95

# Council
council_timeout: 120
council_model: "claude-sonnet-4-6"

# War Room
aac_war_room_url: ""

# Autonomous Scheduler
autonomous_enabled: true
council_trigger_threshold: 75.0
council_min_signals: 3
strategic_review_interval: 14400
aac_sync_interval: 900
workspace_health_interval: 1800
