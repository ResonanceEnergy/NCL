name: Micro Backtest
on:
  pull_request:
    branches: [main]
    paths:
      - 'future_predictor_council/src/**'
      - 'future_predictor_council/config/**'

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd future_predictor_council
          pip install -e ".[dev]"

      - name: Lint
        run: |
          cd future_predictor_council
          ruff check src/ tests/

      - name: Type check
        run: |
          cd future_predictor_council
          mypy src/ --ignore-missing-imports

      - name: Smoke tests
        run: |
          cd future_predictor_council
          pytest tests/test_smoke.py -v

      - name: Micro backtest
        run: |
          cd future_predictor_council
          python -m src.cli --data data/raw/example.csv --freq D --h 7 --windows 3 --output data/artifacts/backtest_report.csv

      - name: Upload backtest report
        uses: actions/upload-artifact@v4
        with:
          name: backtest-report
          path: future_predictor_council/data/artifacts/backtest_report.csv
