[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
check_untyped_defs = True
ignore_missing_imports = True
show_error_codes = True
explicit_package_bases = True

[mypy-tests.*]
disallow_untyped_defs = False

# ── Test modules with mocked third-party modules ──
[mypy-tests.test_telegram_connector]
disable_error_code = attr-defined

[mypy-tests.test_discord_connector]
disable_error_code = attr-defined

# ── Test modules with mock/monkey-patch patterns ──
[mypy-tests.test_concurrency_stress]
disable_error_code = assignment, attr-defined

[mypy-tests.test_consolidation_pipeline]
disable_error_code = assignment

[mypy-tests.test_memory_analytics]
disable_error_code = assignment, attr-defined

[mypy-tests.test_memory_system]
disable_error_code = union-attr, method-assign

[mypy-tests.test_import_negative]
disable_error_code = arg-type, index, no-any-return

[mypy-tests.test_roundtrip]
disable_error_code = index

[mypy-tests.test_evaluation_harness]
disable_error_code = arg-type

[mypy-tests.test_agent_hardening]
disable_error_code = arg-type

[mypy-tests.test_integration_pipeline]
disable_error_code = operator

[mypy-tests.test_system_health_check]
disable_error_code = var-annotated

[mypy-tests.test_relay_server]
disable_error_code = var-annotated

[mypy-tests.test_learning_validation]
disable_error_code = arg-type

# ── Tools with conditional import fallbacks ──
[mypy-tools.import_data]
disable_error_code = misc

[mypy-tools.export]
disable_error_code = misc, index

[mypy-tools.validate_events]
disable_error_code = list-item, misc

[mypy-tools.setup_wizard]
disable_error_code = assignment

[mypy-tools.youtube_digest]
disable_error_code = no-any-return

# ── Runtime ──
[mypy-ncl_agency_runtime.runtime.relay_server]
disable_error_code = arg-type

# Numpy/pandas ExtensionArray vs ndarray type compatibility noise
[mypy-future_predictor_council.src.agents.stubs]
disable_error_code = arg-type, operator

[mypy-future_predictor_council.src.agents.expansion]
disable_error_code = arg-type, operator, union-attr, assignment

[mypy-future_predictor_council.src.council.ensemble]
disable_error_code = arg-type, misc

[mypy-future_predictor_council.src.eval.rolling_backtest]
disable_error_code = arg-type

[mypy-future_predictor_council.src.xai.shap_panel]
disable_error_code = arg-type
