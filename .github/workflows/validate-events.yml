name: Validate NCL events

on:
  pull_request:
    paths: |
      schemas/**
      shortcuts_pack/**
      tools/validate_events.py
  push:
    branches: [ main ]
    paths: |
      schemas/**
      shortcuts_pack/**
      tools/validate_events.py

jobs:
  validate:
    name: Validate event JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dev requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run validator (examples + shortcuts events)
        run: |
          python tools/validate_events.py --event-dirs schemas/ncl.iphone.v1/examples shortcuts_pack/v1/events
