name: Build Repo Index (Public)

on:
  workflow_dispatch:
  schedule:
    - cron: "23 * * * *"  # hourly at :23; adjust as desired

permissions:
  contents: write   # required to push REPO_INDEX files

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate repo list (public) with pagination + org/user auto-detect
        id: gen
        uses: actions/github-script@v7
        with:
          script: |
            const owner = 'ResonanceEnergy';
            const per_page = 100;

            async function listUserRepos() {
              let page = 1, out = [];
              while (true) {
                const res = await github.request('GET /users/{user}/repos', {
                  user: owner, per_page, page, type: 'public', sort: 'full_name'
                });
                if (!res.data.length) break;
                out = out.concat(res.data);
                if (res.data.length < per_page) break;
                page++;
              }
              return out;
            }

            async function listOrgRepos() {
              let page = 1, out = [];
              while (true) {
                const res = await github.request('GET /orgs/{org}/repos', {
                  org: owner, per_page, page, type: 'public', sort: 'full_name'
                });
                if (!res.data.length) break;
                out = out.concat(res.data);
                if (res.data.length < per_page) break;
                page++;
              }
              return out;
            }

            // Try to detect account type (org vs user)
            let acctType = 'user';
            try {
              const u = await github.request('GET /users/{username}', { username: owner });
              acctType = (u.data.type === 'Organization') ? 'org' : 'user';
            } catch (e) {
              core.warning(`Could not fetch /users/${owner}, assuming user. Error: ${e.message}`);
            }

            let repos = [];
            if (acctType === 'org') {
              core.info('Detected Organization account; using /orgs/{org}/repos');
              repos = await listOrgRepos();
            } else {
              core.info('Detected User account; using /users/{user}/repos');
              repos = await listUserRepos();
            }

            // Build minimal dataset for our index
            repos.sort((a,b) => a.full_name.localeCompare(b.full_name));

            // Existing categories (from doctrine). Fallback to 'Uncategorized'.
            const categories = {
              "Core / Command / Brain": ["Super-Agency","AAC","NCC-Doctrine","NCL","ResonanceEnergy_Enterprise"],
              "Capital & Research Programs": ["TESLACALLS2026","future-predictor-council"],
              "Media / Capture / Distribution": ["YOUTUBEDROP"],
              "Products / Experiences / IP Worlds": ["ADVENTUREHEROAUTO","Crimson-Compass"]
            };

            // organize repos by category
            const linesByCat = {};
            for (const cat of Object.keys(categories)) {
              linesByCat[cat] = [];
            }
            linesByCat['Uncategorized'] = [];

            for (const r of repos) {
              let placed = false;
              for (const [cat, names] of Object.entries(categories)) {
                if (names.includes(r.name)) {
                  linesByCat[cat].push(`- [${r.full_name}](${r.html_url}) — ${r.description||''}`.trim());
                  placed = true;
                  break;
                }
              }
              if (!placed) {
                linesByCat['Uncategorized'].push(`- [${r.full_name}](${r.html_url}) — ${r.description||''}`.trim());
              }
            }

            let mdLines = [`# ResonanceEnergy • Public Repositories`, ``, `_Total: ${repos.length}_`, ``];
            for (const [cat, lines] of Object.entries(linesByCat)) {
              if (lines.length === 0) continue;
              mdLines.push(`## ${cat}`, ``);
              mdLines = mdLines.concat(lines, ``);
            }
            const md = mdLines.join('\n');

            const fs = require('fs');
            fs.writeFileSync('REPO_INDEX.md', md);
            fs.writeFileSync('REPO_INDEX.json', JSON.stringify(repos, null, 2));
            core.setOutput('count', repos.length);

      - name: Commit index
        run: |
          git config user.name "re-repo-bot"
          git config user.email "re-repo-bot@users.noreply.github.com"
          git add REPO_INDEX.md REPO_INDEX.json
          git commit -m "Auto-update repo index (count=${{ steps.gen.outputs.count }})" || echo "No changes"
          git push
